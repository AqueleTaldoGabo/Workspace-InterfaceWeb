<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largura e Altura</title>
    <style>
        p{
            background-color: lightgray;
        }
        h1{
            background-color: orange;
            width: 50%;
            height: 250px;
            margin: 30px 70px;
            border-width: 10px;
            border-style: dotted solid;
            border-color: red;
        }

        h2{
            background-color: yellow;
            padding: 50px;
            margin-top: 20px;
            margin-right: 50px;
            margin-bottom: 100px;
            margin-left: 40px;
            margin: 20px 50px 100px 40px;
            outline: 6px dotted blue;
        }
        .destaque{
            background-color: chartreuse;
            font-size: 24px;
        }
        .tamanho{
            width: 400px;
            height: 200px;
        }
    </style>

</head>

<body>
    <h1>Box model</h1>
    <h2>Largura e altura</h2>
    <p class="destaque">Lorem ipsum dolor sit.</p>
    <p class="tamanho">Lorem ipsum dolor sit.</p>
    <p class="destaque tamanho">Lorem ipsum dolor sit.</p>
    <p>Lorem ipsum dolor sit.</p>
    <p>Lorem ipsum dolor sit.</p>

</body>
</html>
