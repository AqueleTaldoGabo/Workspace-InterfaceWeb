<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Listas</title>
    <style>
        ul li{
            background-color: yellow;
            list-style-type:lower-greek;
        }
        ol li{
            background-color: burlywood;
            list-style-type:upper-roman;
        }

    </style>
</head>
<body>
    <h1>Listas</h1>
    <ul>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
        <li>item 4</li>
    </ul>
    <ol>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
        <li>item 4</li>
    </ol>
</body>
</html>
