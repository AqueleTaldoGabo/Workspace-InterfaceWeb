<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Character Counter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="checkers">
        <img src="images/image.png" alt="">
        <h2>Character Counter</h2>
      </div>
      <button class="btn-sol">☼</button>
    </header>

    <main>
      <h1>Analyze your text<br>in real-time.</h1>

      <textarea placeholder="Start typing here... (or paste your text)"></textarea>

      <div class="options">
        <div class="checkers">
          <label><input type="checkbox"> Exclude Spaces</label>
          <label><input type="checkbox"> Set Character Limit</label>
        </div>
        <span>Approx. reading time: 0 minute</span>
      </div>

      <div class="cards">
        <div class="card roxo">
          <h2>00</h2>
          <p>Total Characters</p>
        </div>

        <div class="card laranja">
          <h2>00</h2>
          <p>Word Count</p>
        </div>

        <div class="card salmao">
          <h2>00</h2>
          <p>Sentence Count</p>
        </div>
      </div>

      <div class="densidade">
        <h3>Letter Density</h3>
        <p>No characters found. Start typing to see letter density.</p>
      </div>
    </main>
  </div>
</body>
</html>
